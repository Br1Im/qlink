version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qlink-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: qlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qlink-network

  redis:
    image: redis:7-alpine
    container_name: qlink-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qlink-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    container_name: qlink-backend
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/qlink"
      BOT_TOKEN: ${BOT_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-qlink_super_secret_key_2024}
      PORT: 3000
      API_PORT: 4000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_API_URL: ${SMS_API_URL:-}
    ports:
      - "4000:4000"
    volumes:
      - ./packages/backend:/app/packages/backend
      - /app/packages/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - qlink-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    container_name: qlink-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./packages/frontend:/app/packages/frontend
      - /app/packages/frontend/node_modules
      - /app/packages/frontend/.next
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - qlink-network

volumes:
  postgres_data:
  redis_data:

networks:
  qlink-network:
    driver: bridge